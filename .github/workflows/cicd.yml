# ──────────────────────────────────────────────────────────────────────────────
# EduPlatform AI — CI/CD Pipeline
# From: nameisankit/education-app (DevOps layer)
#
# Workflow:
#   1. Test (lint + import check)
#   2. Build & push Docker image to DockerHub
#   3. Deploy to AWS EC2 via SSH
# ──────────────────────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/edu-platform

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=10 --max-line-length=120 --statistics

      - name: Check imports
        run: |
          python -c "from agents.base import BaseAgent, AgentMemory; print('✅ agents.base OK')"
          python -c "from agents.education_agents import CurriculumAgent, TutorAgent, QuizAgent, FeedbackAgent; print('✅ agents.education_agents OK')"
          python -c "from agents.pipeline import EducationPipeline; print('✅ agents.pipeline OK')"

  # ── Job 2: Build & Push Docker Image ────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to AWS EC2 ─────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "🔄 Pulling latest image..."
            docker pull ${{ env.IMAGE_NAME }}:latest

            echo "🛑 Stopping existing container..."
            docker stop eduplatform || true
            docker rm eduplatform || true

            echo "🚀 Starting new container..."
            docker run -d \
              --name eduplatform \
              --restart unless-stopped \
              -p 8501:8501 \
              -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              ${{ env.IMAGE_NAME }}:latest

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete!"
            docker ps | grep eduplatform

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            sleep 10
            curl -f http://localhost:8501/_stcore/health && echo "✅ App is healthy!" || echo "⚠️ Health check failed"
