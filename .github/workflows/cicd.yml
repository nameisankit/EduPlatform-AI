name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t edu-platform .

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag image
        run: docker tag edu-platform ${{ secrets.DOCKER_USERNAME }}/edu-platform:latest

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/edu-platform:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker system prune -a -f

            docker stop eduplatform || true
            docker rm eduplatform || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/edu-platform:latest

            docker run -d -p 8501:8501 \
            --name eduplatform \
            --restart always \
              -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/edu-platform:latest