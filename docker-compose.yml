# EduPlatform AI — Docker Compose (local dev)

version: "3.8"

services:
  eduplatform:
    build:
      context: .
      dockerfile: Dockerfile
    image: edu-platform:latest
    container_name: eduplatform
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app          # Hot-reload for development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: eduplatform-net
